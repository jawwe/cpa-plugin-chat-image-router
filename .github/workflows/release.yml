name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: so
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: dll
          - goos: darwin
            goarch: amd64
            runner: macos-13
            ext: dylib
          - goos: darwin
            goarch: arm64
            runner: macos-14
            ext: dylib

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build plugin archive
        shell: pwsh
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          PLUGIN_ID: cpa-plugin-chat-image-router
          EXT: ${{ matrix.ext }}
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $library = "$env:PLUGIN_ID.$env:EXT"
          $archive = "$($env:PLUGIN_ID)_$($version)_$($env:GOOS)_$($env:GOARCH).zip"
          go build -buildmode=c-shared -o $library .
          Remove-Item "$env:PLUGIN_ID.h" -ErrorAction SilentlyContinue
          Compress-Archive -Path $library -DestinationPath $archive -Force

      - uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cpa-plugin-chat-image-router_*.zip

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.zip > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/checksums.txt
